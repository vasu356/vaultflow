server:
  port: 8082
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 10MB
    connection-timeout: 120000  # 2min for large uploads

spring:
  application:
    name: upload-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultflow}
    username: ${DB_USERNAME:vaultflow}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: UploadHikariPool
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 25
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 30
          max-idle: 10
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
  servlet:
    multipart:
      enabled: false  # We handle streaming manually — disable Spring multipart parsing

vaultflow:
  storage:
    base-dir: ${STORAGE_BASE_DIR:/data/vaultflow/objects}
  jwt:
    issuer: vaultflow-auth

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        upload.singlepart.duration: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] [%X{userId}] %logger{36} - %msg%n"
  level:
    com.vaultflow: DEBUG
