spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/vaultflow_test
    username: vaultflow
    password: ${DB_PASSWORD:#{null}}
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

vaultflow:
  storage:
    base-dir: /tmp/vaultflow-test-storage
  jwt:
    issuer: vaultflow-auth

logging:
  level:
    com.vaultflow: DEBUG
    org.springframework.security: WARN
