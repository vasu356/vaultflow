server:
  port: 8081
  shutdown: graceful
  tomcat:
    threads:
      # Virtual threads handle I/O-bound work; bounded pool prevents heap exhaustion
      max: 200
      min-spare: 10

spring:
  application:
    name: auth-service

  threads:
    virtual:
      enabled: true  # Java 21 virtual threads for all @Async and request handling

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultflow}
    username: ${DB_USERNAME:vaultflow}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: AuthHikariPool
      maximum-pool-size: 20       # Formula: (cores * 2) + effective_spindle_count
      minimum-idle: 5
      connection-timeout: 30000   # 30s: fail fast on DB unavailability
      idle-timeout: 600000        # 10min idle connection eviction
      max-lifetime: 1800000       # 30min: prevents stale connections after DB restart
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000  # Warn if connection held > 60s (likely bug)

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway owns schema; JPA validates only
    properties:
      hibernate:
        # dialect auto-detected from driver — no explicit setting needed in Spring Boot 3.x
        format_sql: false
        default_batch_fetch_size: 25  # Prevents N+1 for lazy collections
        jdbc:
          batch_size: 50
          fetch_size: 50
    open-in-view: false  # Prevents lazy-loading surprises; forces explicit fetch in service layer

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all  # Wait for all in-sync replicas — no data loss on leader failure
      retries: 3
      properties:
        enable.idempotence: true  # Exactly-once producer semantics
        max.in.flight.requests.per.connection: 5

vaultflow:
  jwt:
    access-token-expiry-seconds: 900      # 15 minutes
    refresh-token-expiry-seconds: 604800  # 7 days
    issuer: vaultflow-auth

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true  # Kubernetes liveness/readiness probes
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true  # Enable histogram for p50/p95/p99
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; set to 0.1 in prod

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] [%X{userId}] %logger{36} - %msg%n"
  level:
    com.vaultflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
