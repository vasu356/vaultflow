spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    # Overridden by @DynamicPropertySource in tests
    url: jdbc:postgresql://localhost:5432/vaultflow_test
    username: vaultflow
    password: vaultflow
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

vaultflow:
  jwt:
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 604800
    issuer: vaultflow-auth

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.vaultflow: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
