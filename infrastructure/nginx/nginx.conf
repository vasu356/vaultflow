worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================================
    # Logging
    # ============================================================
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"correlation_id":"$http_x_correlation_id",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ============================================================
    # Performance
    # ============================================================
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;

    # Large file uploads: disable request buffering so streams go directly to backend
    # Without this, NGINX would buffer the entire upload before forwarding — kills large file UX
    client_max_body_size        5g;
    client_body_buffer_size     128k;
    client_body_timeout         300s;
    proxy_request_buffering     off;   # Critical: stream upload directly to backend
    proxy_buffering             off;   # Critical: stream download directly to client
    proxy_connect_timeout       10s;
    proxy_send_timeout          300s;
    proxy_read_timeout          300s;

    # ============================================================
    # Rate Limiting Zones
    # limit_req_zone: connection-level rate limiting (burst handling)
    # ============================================================
    # 10 MB shared memory zone, 10 requests/sec per IP for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    # 100 requests/sec per IP for upload endpoints
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=100r/s;
    # 200 requests/sec per IP for download endpoints
    limit_req_zone $binary_remote_addr zone=download_limit:10m rate=200r/s;
    # General API rate limit
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    # ============================================================
    # Upstream Pools
    # ============================================================
    upstream auth_backend {
        least_conn;  # Route to least-connected backend (better for long-lived connections)
        server auth-service:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream upload_backend {
        least_conn;
        server upload-service:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream download_backend {
        least_conn;
        server download-service:8083 max_fails=3 fail_timeout=30s;
        keepalive 64;  # More keepalive for download — sustained connections
    }

    upstream admin_backend {
        server admin-service:8087 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream metadata_backend {
        least_conn;
        server metadata-service:8084 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ============================================================
    # Main Server Block (HTTP → HTTPS redirect in production)
    # ============================================================
    server {
        listen 80;
        server_name _;

        # ---- Security Headers ----
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # In production, add Content-Security-Policy header here

        # Remove server version from responses
        server_tokens off;

        # ---- Correlation ID passthrough ----
        # Generate correlation ID if client didn't provide one
        set $correlation_id $http_x_correlation_id;
        if ($correlation_id = "") {
            set $correlation_id $request_id;
        }
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        # ---- Common proxy headers ----
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Enable HTTP keepalive to backends

        # ============================================================
        # Health check (no rate limit, no auth)
        # ============================================================
        location /health {
            access_log off;
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # ============================================================
        # Auth Service Routes
        # ============================================================
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_backend;
        }

        location /api/v1/users/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://auth_backend;
        }

        # ============================================================
        # Upload Service Routes
        # Higher timeouts and no request buffering for large files
        # ============================================================
        location /api/v1/buckets/ {
            # Bucket management (small payloads)
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://upload_backend;
        }

        location ~ ^/api/v1/buckets/[^/]+/objects/ {
            # Object upload — no rate limit on body, but connection rate limited
            limit_req zone=upload_limit burst=200 nodelay;

            # No buffering for streaming uploads
            proxy_request_buffering off;
            proxy_buffering         off;
            client_max_body_size    5g;

            proxy_pass http://upload_backend;
        }

        location /api/v1/uploads/ {
            limit_req zone=upload_limit burst=200 nodelay;
            proxy_request_buffering off;
            proxy_buffering         off;
            client_max_body_size    500m;  # Individual part max 500 MB
            proxy_pass http://upload_backend;
        }

        # ============================================================
        # Download Service Routes
        # ============================================================
        location ~ ^/api/v1/buckets/[^/]+/objects/.+$ {
            # Restrict to GET/HEAD only — PUT/DELETE go to upload_backend above
            limit_except GET HEAD { deny all; }

            limit_req zone=download_limit burst=500 nodelay;
            proxy_buffering off;  # Stream directly to client

            # Cache-friendly proxy headers for CDN integration
            proxy_hide_header Cache-Control;
            add_header Cache-Control "private, max-age=300" always;

            proxy_pass http://download_backend;
        }

        location /api/v1/download/ {
            # Signed URL downloads — no auth header required
            limit_req zone=download_limit burst=1000 nodelay;
            proxy_buffering off;
            proxy_pass http://download_backend;
        }

        # ============================================================
        # Admin Service Routes (restricted)
        # ============================================================
        location /api/v1/admin/ {
            # Restrict to internal network in production
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://admin_backend;
        }

        # ============================================================
        # Metadata Service Routes
        # ============================================================
        location /api/v1/search {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://metadata_backend;
        }

        # ============================================================
        # Swagger UI (dev only — disable in production)
        # ============================================================
        location /swagger-ui/ {
            proxy_pass http://auth_backend;
        }

        location /v3/api-docs/ {
            proxy_pass http://auth_backend;
        }

        # ============================================================
        # 404 for everything else
        # ============================================================
        location / {
            return 404 '{"errorCode":"NOT_FOUND","message":"Endpoint not found","status":404}';
            add_header Content-Type application/json;
        }
    }
}
