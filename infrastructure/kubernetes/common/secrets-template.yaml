---
# IMPORTANT: In production, these values are injected by Vault Agent or External Secrets Operator.
# Never commit actual secret values to Git — this file is a template only.
# Values shown are base64("placeholder") — replace in deployment pipeline.
apiVersion: v1
kind: Secret
metadata:
  name: vaultflow-secrets
  namespace: vaultflow
  annotations:
    # Indicates this secret is managed by External Secrets Operator in prod
    externalsecrets.io/managed: "true"
type: Opaque
stringData:
  DB_PASSWORD: "<inject-from-vault>"
  REDIS_PASSWORD: "<inject-from-vault>"
  SIGNED_URL_SECRET: "<inject-from-vault>"
  JWT_PRIVATE_KEY_PEM: "<inject-from-vault>"
