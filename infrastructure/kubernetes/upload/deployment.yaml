---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: vaultflow
  labels:
    app: upload-service
    app.kubernetes.io/part-of: vaultflow
spec:
  replicas: 3  # More replicas for upload — CPU-intensive (SHA-256, storage I/O)
  selector:
    matchLabels:
      app: upload-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: upload-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      terminationGracePeriodSeconds: 60  # Longer: allow in-flight uploads to complete
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [upload-service]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: upload-service
          image: vaultflow/upload-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: vaultflow-common-config
            - secretRef:
                name: vaultflow-secrets
          env:
            - name: JAVA_OPTS
              value: >-
                -XX:MaxRAMPercentage=75.0
                -XX:+UseZGC
                -XX:+ZGenerational
                -Djava.security.egd=file:/dev/./urandom
          resources:
            requests:
              cpu: "500m"      # Higher CPU for SHA-256 computation
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"    # Large heap for buffering upload streams
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            failureThreshold: 24
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false  # Needs to write to storage volume
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: object-storage
              mountPath: /data/vaultflow/objects
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: object-storage
          persistentVolumeClaim:
            claimName: object-storage-pvc
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: vaultflow
spec:
  selector:
    app: upload-service
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-service-hpa
  namespace: vaultflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: upload-service-pdb
  namespace: vaultflow
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: upload-service

---
# Persistent Volume Claim for object storage
# In production: backed by NFS, Ceph, or cloud-provider block storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: object-storage-pvc
  namespace: vaultflow
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods share the same storage volume
  storageClassName: standard
  resources:
    requests:
      storage: 1Ti
