server:
  port: 8084
  shutdown: graceful

spring:
  application:
    name: metadata-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultflow}
    username: ${DB_USERNAME:vaultflow}
    password: ${DB_PASSWORD:vaultflow}
    hikari:
      pool-name: MetadataHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: metadata-service
      auto-offset-reset: earliest
      enable-auto-commit: false

vaultflow:
  jwt:
    issuer: vaultflow-auth

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] [%X{userId}] %logger{36} - %msg%n"
  level:
    com.vaultflow: DEBUG
