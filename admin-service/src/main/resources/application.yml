server:
  port: 8087
  shutdown: graceful
spring:
  application:
    name: admin-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultflow}
    username: ${DB_USERNAME:vaultflow}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: AdminHikariPool
      maximum-pool-size: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
vaultflow:
  jwt:
    issuer: vaultflow-auth
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] [%X{userId}] %logger{36} - %msg%n"
  level:
    com.vaultflow: DEBUG
