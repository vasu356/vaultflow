spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/vaultflow_test
    username: vaultflow
    password: ${DB_PASSWORD:#{null}}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false

vaultflow:
  jwt:
    issuer: vaultflow-auth

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.vaultflow: DEBUG
    org.springframework.kafka: WARN
