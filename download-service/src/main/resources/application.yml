server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: download-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultflow}
    username: ${DB_USERNAME:vaultflow}
    password: ${DB_PASSWORD:vaultflow}
    hikari:
      pool-name: DownloadHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 1800000
  # No JPA entities in download-service — all queries via JdbcTemplate
  # JPA autoconfiguration still needed for SignedUrlRecord (@Entity)
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

vaultflow:
  storage:
    base-dir: ${STORAGE_BASE_DIR:/data/vaultflow/objects}
  signed-url:
    secret: ${SIGNED_URL_SECRET:change-me-in-production}
  download:
    base-url: ${DOWNLOAD_BASE_URL:http://localhost:8083}
  jwt:
    issuer: vaultflow-auth

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] [%X{userId}] %logger{36} - %msg%n"
  level:
    com.vaultflow: DEBUG
