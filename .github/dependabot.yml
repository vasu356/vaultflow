version: 2

updates:
  # Maven dependencies (Java services)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group patch updates together to reduce PR noise
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework.cloud*"
      kafka:
        patterns:
          - "org.springframework.kafka*"
          - "org.apache.kafka*"
      observability:
        patterns:
          - "io.micrometer*"
          - "io.opentelemetry*"
      testing:
        patterns:
          - "org.testcontainers*"
          - "io.rest-assured*"
          - "org.awaitility*"
    # Security updates are never ignored
    ignore:
      # Don't auto-bump major versions — review manually
      - dependency-name: "org.springframework.boot:spring-boot-dependencies"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.apache.kafka:*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/auth-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/upload-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/download-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/processing-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/notification-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/admin-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/metadata-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "docker"
