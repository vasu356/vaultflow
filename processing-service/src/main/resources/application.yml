server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: processing-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultflow}
    username: ${DB_USERNAME:vaultflow}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: ProcessingHikariPool
      maximum-pool-size: 10
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Consumer group ID is set at the factory level in ProcessingKafkaConfig.
    # Group: processing-service (file.uploaded, 16 partitions)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

vaultflow:
  storage:
    base-dir: ${STORAGE_BASE_DIR:/data/vaultflow/objects}
  processing:
    pool-size: 8
    virus-scan:
      max-file-size-bytes: 104857600  # 100 MB

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
  level:
    com.vaultflow: DEBUG
